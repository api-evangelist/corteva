aid: corteva
name: Corteva
kind: company
description: >-
  Corteva Agriscience is a publicly traded, Fortune 500 global pure-play
  agriculture company that provides farmers around the world with one of the
  most complete portfolios in the industry, including a balanced and diverse
  mix of seed, crop protection, and digital products. Corteva was formed as
  the spinoff of the agriculture division of DowDuPont in June 2019. The
  company markets seeds under the Pioneer, Brevant, and other brands and
  crop protection products including herbicides, fungicides, insecticides,
  and biologicals. Corteva also operates Granular, a farm management
  software platform with insights and analytics products. A public developer
  API is not currently published; growers access tools through the Granular
  Insights and Granular Link platforms.
